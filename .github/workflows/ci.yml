name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff pyyaml

      - name: Python syntax check
        run: |
          for f in *.py; do
            python -m py_compile "$f"
            echo "OK $f"
          done

      - name: Ruff lint
        run: ruff check .

      - name: Validate football.yaml
        run: python -c "import yaml; yaml.safe_load(open('football.yaml')); print('football.yaml OK')"

      - name: Validate requirements.txt
        run: |
          python - <<'PY'
          from pathlib import Path
          lines = [
              line.strip()
              for line in Path("requirements.txt").read_text().splitlines()
              if line.strip() and not line.strip().startswith("#")
          ]
          assert lines, "requirements.txt has no packages"
          print(f"{len(lines)} packages listed")
          for line in lines:
              print(f"  - {line}")
          PY

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --max-warnings=0

      - name: Production build
        run: CI=true npm run build

  structure:
    name: Structure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify critical files
        run: |
          files=(
            README.md
            LICENSE
            Makefile
            docker-compose.yml
            .gitignore
            backend/api.py
            backend/detect.py
            backend/train.py
            backend/tracker.py
            backend/team_classifier.py
            backend/stats_engine.py
            backend/heatmap.py
            backend/download_dataset.py
            backend/system_test.py
            backend/requirements.txt
            backend/football.yaml
            backend/ruff.toml
            backend/.env.example
            backend/Dockerfile
            frontend/package.json
            frontend/package-lock.json
            frontend/src/App.js
            frontend/src/pages/Home.js
            frontend/src/pages/Upload.js
            frontend/src/components/Navbar.js
            frontend/src/components/UploadBox.js
            frontend/src/components/DetectionCanvas.js
            frontend/src/services/detectionApi.js
            frontend/Dockerfile
            frontend/nginx.conf
            .github/workflows/ci.yml
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK $f"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::Critical files are missing"
            exit 1
          fi
